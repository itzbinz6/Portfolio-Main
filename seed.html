<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Seed Firestore — One Time Use</title>
<style>
  body { font-family: sans-serif; max-width: 600px; margin: 60px auto; padding: 24px; background: #fafaf8; color: #1a1a18; }
  h1 { font-size: 1.4rem; margin-bottom: 8px; }
  p { color: #52524c; margin-bottom: 24px; font-size: 0.9375rem; line-height: 1.6; }

  /* Login form */
  #loginSection { margin-bottom: 28px; }
  #loginSection label { display: block; font-size: 0.875rem; font-weight: 600; margin-bottom: 4px; color: #1a1a18; }
  #loginSection input { display: block; width: 100%; box-sizing: border-box; padding: 10px 14px; margin-bottom: 12px; border: 1.5px solid #d4d4c8; border-radius: 8px; font-size: 0.9375rem; background: #fff; color: #1a1a18; }
  #loginSection input:focus { outline: none; border-color: #0a5c3c; }
  #loginStatus { font-size: 0.875rem; margin-bottom: 12px; min-height: 1.4em; }
  .status-ok  { color: #0a5c3c; font-weight: 600; }
  .status-err { color: #c0392b; }

  button { padding: 14px 28px; background: #0a5c3c; color: #fff; border: none; border-radius: 8px; font-size: 1rem; font-weight: 600; cursor: pointer; margin-right: 10px; }
  button:disabled { opacity: .5; cursor: default; }
  #seedBtn { margin-top: 8px; }

  #log { margin-top: 24px; font-size: 0.875rem; line-height: 2; }
  .ok   { color: #0a5c3c; }
  .err  { color: #c0392b; }
  .done { font-weight: 700; font-size: 1rem; margin-top: 16px; }
</style>
</head>
<body>
<h1>Firestore Seeder</h1>
<p>This pushes all your projects, tools, certifications, and blog posts into Firestore. Run it <strong>once</strong> — then keep this file private. It skips any collection that already has data so nothing duplicates.</p>

<!-- Step 1: Login -->
<div id="loginSection">
  <label for="emailInput">Firebase Account Email</label>
  <input type="email" id="emailInput" placeholder="you@example.com" />
  <label for="passInput">Password</label>
  <input type="password" id="passInput" placeholder="••••••••" />
  <div id="loginStatus"></div>
  <button id="loginBtn">Sign In</button>
</div>

<!-- Step 2: Seed (hidden until logged in) -->
<div id="seedSection" style="display:none;">
  <button id="seedBtn">Seed Everything</button>
</div>

<div id="log"></div>

<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-auth-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore-compat.js"></script>
<script src="firebase-config.js"></script>
<script>
const log        = document.getElementById('log');
const loginBtn   = document.getElementById('loginBtn');
const seedBtn    = document.getElementById('seedBtn');
const loginStatus = document.getElementById('loginStatus');

function print(msg, cls) {
  const d = document.createElement('div');
  d.className = cls || '';
  d.textContent = msg;
  log.appendChild(d);
}

// ─── DATA ────────────────────────────────────────────────────────────────────

    { name: "Sato's Kitchen",              type: "West African Restaurant · Brixton, London",     description: "A women-owned West African restaurant in Brixton with 4.9 stars on Google but no proper web presence. Built a landing page that matches the warmth and quality of the food — table reservations, menu, and their story.",       link: "https://satodemo0.vercel.app/",          imageUrl: "images/sato-kitchen.png",                demoTag: true,  order: 30  },
    { name: "Rossycakes & Events",         type: "Bakery · Food & Events",                        description: "A cake studio doing beautiful work in Ilorin with nothing but Instagram to show it. Built a landing page with a product gallery, occasion categories, live review system, and a clear order CTA.",                              link: "https://rossydemo0.vercel.app/",         imageUrl: "images/rossycakes.png",                  demoTag: true,  order: 40  },
    { name: "Cup & Cup",                   type: "Café · Plano, Texas",                           description: "A Korean bubble tea café in Plano with a Wix site that had a noindex bug hiding them from Google entirely. Built a clean replacement with their full menu, gallery, and fixed SEO.",                                           link: "https://cupdemo0.vercel.app/",           imageUrl: "images/cup-and-cup.png",                 demoTag: true,  order: 50  },
    { name: "12 Baskets Foods",            type: "Food & Catering · Lagos",                       description: "Their original site had no way to keep the menu current. Built a new one with a live database — admins can update the menu directly without touching any code. The site always reflects what's actually available.",            link: "https://12-baskets.vercel.app/",         imageUrl: "images/12baskets.png",                   demoTag: true,  order: 60  },
    { name: "Berkshire Hathaway Redesign (v1)", type: "Corporate · Redesign Concept",             description: "A from-scratch redesign of Berkshire Hathaway's famously bare-bones corporate site, built with plain static HTML and CSS. Keeps all the dense content investors care about but reorganizes it into a modern, scannable layout.", link: "https://berkshiredemov1.vercel.app/",    imageUrl: "",                                       demoTag: false, order: 70  },

  ],

// ─── STEP 1: LOGIN ────────────────────────────────────────────────────────────
loginBtn.addEventListener('click', async () => {
  const email = document.getElementById('emailInput').value.trim();
  const pass  = document.getElementById('passInput').value;

  if (!email || !pass) {
    loginStatus.className = 'status-err';
    loginStatus.textContent = 'Enter your email and password first.';
    return;
  }

  loginBtn.disabled = true;
  loginStatus.className = '';
  loginStatus.textContent = 'Signing in…';

  try {
    const auth = firebase.auth();
    await auth.signInWithEmailAndPassword(email, pass);
    loginStatus.className = 'status-ok';
    loginStatus.textContent = `✅ Signed in as ${email}`;
    document.getElementById('loginSection').style.opacity = '0.5';
    document.getElementById('loginSection').style.pointerEvents = 'none';
    document.getElementById('seedSection').style.display = 'block';
  } catch (err) {
    loginStatus.className = 'status-err';
    loginStatus.textContent = `❌ ${err.message}`;
    loginBtn.disabled = false;
  }
});

// ─── STEP 2: SEED ─────────────────────────────────────────────────────────────
seedBtn.addEventListener('click', async () => {
  seedBtn.disabled = true;
  log.innerHTML = '';

  const db = firebase.firestore();

  for (const [collection, items] of Object.entries(DATA)) {
    print(`⏳ Checking "${collection}"…`);
    try {
      const existing = await db.collection(collection).limit(1).get();
      if (!existing.empty) {
        print(`⚠️  "${collection}" already has data — skipping to avoid duplicates.`, 'err');
        continue;
      }
      for (const item of items) {
        await db.collection(collection).add(item);
        print(`   ✓ Added: ${item.name || item.title || item.tag}`, 'ok');
      }
      print(`✅ "${collection}" seeded (${items.length} items).`, 'ok');
    } catch (err) {
      print(`❌ Error in "${collection}": ${err.message}`, 'err');
    }
  }

  print('', '');
  print('🎉 All done! You can now close this page and manage everything from admin.html.', 'done');
});
</script>
</body>
</html>
